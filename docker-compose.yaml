services:
  obolonka:
    build:
      context: ./obolonka
    ports:
      - "5173:3000"
    networks:
      - mererza

  pokazovaSlurzba:
    image: bondarenkorodion/slurzba1
    ports:
      - "3000:3000"
    networks:
      - mererza

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

  backend:
    build: ./backend
    ports:
      - "6001:5000"
    environment:
      - MONGO_URL=mongodb://mongodb:27017/solar_system
    depends_on:
      - mongodb

  mongodb:
    image: mongo:6
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

networks:
  mererza:
    driver: bridge

volumes:
  mongo_data:

services:
  obolonka:
    build:
      context: ./obolonka
    ports:
      - "5173:3000"
    networks:
      - mererza

  backend-service:
    # build: ./backend
    image: dkolodko/diplom-backend:latest
    ports:
      - "6005:8000" 
    restart: always

  backend_troian:
    image: vitaliktroian04/smart-energy-stability:latest
    ports:
      - "6028:8085"
    restart: always

  backend_dosmukhamedov:
    image: xerarobespierre/hybridinvertor-backend-1:latest
    ports:
      - "6050:6050"
    restart: always

  pokazovaSlurzba:
    image: bondarenkorodion/slurzba1
    ports:
      - "3000:3000"
    networks:
      - mererza

  smartenergy-backend:
    image: puvlichok/smartenergy-backend
    ports:
    - "6007:6007"


# [Початок] Монастирний Моніторинг
  influxdb:
    image: influxdb:2-alpine
    ports: ["6029:8086"]
    volumes:
      - influxdb_data:/var/lib/influxdb2
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=secretpassword_smartenergy6
      - DOCKER_INFLUXDB_INIT_ORG=KPI
      - DOCKER_INFLUXDB_INIT_BUCKET=smart_energy
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=secretpassword_smartenergy6

  # MQTT Broker
  mosquitto:
    image: eclipse-mosquitto:2.1.2-alpine
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf
      - ./mosquitto.passwd:/mosquitto/config/mosquitto.passwd
      - ./mosquitto.acl:/mosquitto/config/mosquitto.acl
    ports:
      - "6030:1883"
      - "6031:9001"

  # ESP32 Simulator Controller
  simulators:
    image: vicmony/monitoring-monastyrnyi-simulators
    depends_on:
      - mosquitto
    environment:
      - BROKER_URL=mqtt://mosquitto:1883
      - MQTT_USER=simulator
      - MQTT_PASSWORD=simulator_pass
      - CLIENT_ID=ESP32_SIMULATOR
      - SENSOR_DATA_TOPIC=sensor/data
      - SIMULATOR_CONTROL_TOPIC=simulator/control
      - SIMULATOR_STATUS_TOPIC=simulator/status

  # Ingestor (Скрипт, що переписує дані з MQTT в InfluxDB)
  ingestor:
    image: vicmony/monitoring-monastyrnyi-ingestor
    depends_on:
      - influxdb
      - mosquitto
    environment:
      - TZ=Europe/Kyiv
      - MQTT_URL=mqtt://mosquitto:1883
      - MQTT_USER=ingestor
      - MQTT_PASSWORD=ingestor_pass
      - INFLUX_URL=http://influxdb:8086
      - INFLUX_TOKEN=secretpassword_smartenergy6
      - INFLUX_ORG=KPI
      - INFLUX_BUCKET=smart_energy
      - DATA_SAVE_TOPIC=sensor-data

  # History API (Microservice for historical data)
  history-api:
    image: vicmony/monitoring-monastyrnyi-history-api
    ports:
      - "6032:6032"
    depends_on:
      - influxdb
    environment:
      - INFLUX_URL=http://influxdb:8086
      - INFLUX_TOKEN=secretpassword_smartenergy6
      - INFLUX_ORG=KPI
      - INFLUX_BUCKET=smart_energy
      - PORT=6032
      - DATA_SAVE_TOPIC=sensor-data
# [Кінець] Монастирний Моніторинг


# [Початок] Семенчук Олександр ТВ-22
services:
  postgres-semenchuk:
    image: postgres:16-alpine
    container_name: postgres_semenchuk
    ports:
      - "5432:5432"  # Обов'язково відкриваємо порт назовні, щоб викладач міг перевірити базу через DBeaver
    environment:
      POSTGRES_DB: smart_energy_semenchuk
      POSTGRES_USER: alex_semenchuk
      POSTGRES_PASSWORD: super_password_10
    volumes:
      - smart_energy_semenchuk_pg:/var/lib/postgresql/data
    networks:
      - mererza
    restart: unless-stopped

  mosquitto-semenchuk:
    image: eclipse-mosquitto:2
    container_name: mosquitto_semenchuk
    ports:
      - "1883:1883"
    command: >
      sh -c "echo 'listener 1883\nallow_anonymous false\npassword_file /mosquitto/config/passwd\npersistence false' > /mosquitto/config/mosquitto.conf &&
      mosquitto_passwd -b -c /mosquitto/config/passwd smartenergy SmartEnergy2024 &&
      mosquitto_passwd -b /mosquitto/config/passwd subscriber SmartEnergy2024 &&
      exec mosquitto -c /mosquitto/config/mosquitto.conf"
    networks:
      - mererza
    restart: unless-stopped

  smart-energy-backend-semenchuk:
    build:
      context: ./smart-energy-backend
    container_name: backend_semenchuk
    ports:
      - "6010:6010"  # Наш порт бекенда, куди буде стукати фронтенд
    environment:
      - DB_HOST=postgres-semenchuk
      - DB_PORT=5432
      - DB_NAME=smart_energy_semenchuk
      - DB_USER=alex_semenchuk
      - DB_PASSWORD=super_password_10
      - MQTT_HOST=mosquitto-semenchuk
      - MQTT_PORT=1883
      - MQTT_USERNAME=smartenergy
      - MQTT_PASSWORD=SmartEnergy2024
    depends_on:
      - postgres-semenchuk
      - mosquitto-semenchuk  
    networks:
      - mererza
    restart: unless-stopped

volumes:
  smart_energy_semenchuk_pg:

networks:
  mererza:
    driver: bridge
# [Кінець] Семенчук Олександр ТВ-22

# START Шевченко Анастасія Володимирівна
# Functional Stability

  functional-stability-shevchenko:
    image: mistressmorgana/energy-backend:latest
    ports:
      - "6040:8000"
    restart: unless-stopped

# END Шевченко Анастасія Володимирівна

  backend-kravchenko:
    image: nastensii/smart-energy-backend:latest
    container_name: smart_energy_api_kravchenko
    ports:
      - "6006:8000"
    environment:
      - INFLUX_URL=http://influxdb:8086
      - INFLUX_TOKEN=secretpassword_smartenergy6
      - MQTT_BROKER=broker.hivemq.com
      - MQTT_PORT=1883

  backend_yaroslav:
    image: yaroslav333/my-backend:latest
    ports:
      - "6001:5000"
    restart: always
    environment:
      - MONGO_URL=mongodb://mongodb:27017/solar_system
    networks:
      - mererza
    depends_on:
      - mongodb
  
  mongodb:
    image: mongo:6
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - mererza

networks:
  mererza:
    driver: bridge

volumes:
  influxdb_data: # оголошено том для всього проєкту
  mongo_data:
  smart_energy_semenchuk_pg:

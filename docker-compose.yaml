version: '3.8'

services:
  smart-energy-backend:
    image: sssom228/smart-energy-backend:latest
    ports:
      - "6042:8000"
    restart: always
    networks:
      - mererza

  obolonka:
    build:
      context: ./obolonka
    ports:
      - "5173:3000"
    restart: always
    networks:
      - mererza
    depends_on:
      - smart-energy-backend

networks:
  mererza:
    driver: bridge
